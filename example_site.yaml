# sites.yaml
# ============================================================
# 位点定义文件（SiteDefinition）
#
# 本文件用于定义“表面位点”（如 top / bridge / fcc / hcp），
# 程序会根据 adsorption 边（吸附键）把每个组分映射到最可能的位点。
#
# 与 analyzer_config.yaml 的关联：
# - site.enabled: true
# - site.file: "sites.yaml"
# - site.index_base: 0 或 1   <-- 必须与你这里 atoms 的编号习惯一致
#
# 支持两种根键名（等价）：
# - sites              （推荐）
# - site_definitions   （兼容）
# ============================================================

sites:
  # ----------------------------------------------------------
  # 每个 site 条目必填字段：
  # - id      : 位点唯一ID（全文件不能重复）
  # - type    : 位点类型（如 top/bridge/fcc/hcp/custom）
  # - atoms   : 该位点关联的“宿主原子索引”列表
  #
  # 可选字段：
  # - name     : 人类可读名称
  # - priority : 优先级（默认0；仅在前两级评分并列时用于打破平局）
  #
  # 评分规则（程序内部）：
  # 1) n_ads_bond_hits      吸附键命中数（越大越优）
  # 2) n_unique_host_atoms  命中的不同宿主原子数（越大越优）
  # 3) priority             越大越优
  #
  # 若仍完全并列，则按 site_id 字典序选 primary，并标记 ambiguous=1。
  # ----------------------------------------------------------

  # ===== 顶位（top）示例 =====
  - id: "top_001"
    type: "top"
    atoms: [0]              # 0-based 示例（若 index_base=1，则这里写 [1]）
    name: "top above Pt(0)"
    priority: 10

  - id: "top_002"
    type: "top"
    atoms: [1]
    name: "top above Pt(1)"
    priority: 10

  # ===== 桥位（bridge）示例 =====
  - id: "bridge_001"
    type: "bridge"
    atoms: [0, 1]
    name: "bridge between Pt(0)-Pt(1)"
    priority: 20

  - id: "bridge_002"
    type: "bridge"
    atoms: [1, 2]
    name: "bridge between Pt(1)-Pt(2)"
    priority: 20

  # ===== 三重位（fcc / hcp）示例 =====
  - id: "fcc_001"
    type: "fcc"
    atoms: [0, 1, 2]
    name: "fcc hollow"
    priority: 30

  - id: "hcp_001"
    type: "hcp"
    atoms: [3, 4, 5]
    name: "hcp hollow"
    priority: 30

  # ===== 自定义类型示例 =====
  - id: "step_edge_01"
    type: "step"
    atoms: [10, 11, 12]
    name: "step-edge custom site"
    priority: 50


# ============================================================
# 常见坑与检查清单
# ============================================================
#
# 1) 索引基准必须一致
#    - 若 analyzer_config.yaml 中 site.index_base: 0
#      则此文件 atoms 应使用 0-based（ASE 默认）
#    - 若 site.index_base: 1
#      则此文件 atoms 写 1-based，程序会自动减1
#
# 2) id 必须唯一
#    - 重复 id 会直接报错
#
# 3) atoms 不能为空、不能重复、必须是整数
#    - 例如 atoms: [1, 1, 2] 会报 duplicate
#
# 4) strict_index_validation 的影响（在 analyzer_config.yaml 的 site 段）
#    - true: 越界索引或“非slab原子索引”会报错
#    - false: 非法索引会被跳过（但可能导致位点分配变弱）
#
# 5) 如果 site.enabled=false
#    - 本文件不会参与分析（建议 site.file 设为 null）
#
# 6) site_signature_mode 建议
#    - type     : 标签更紧凑，适合统计
#    - id       : 追踪具体位点最清晰
#    - type+id  : 信息最全，标签更长
#
# ============================================================