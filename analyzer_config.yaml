# analyzer_config.yaml
run:
  traj: "md.extxyz"
  out_prefix: "md"
  stride: 1
  max_frames: null          # null 表示不截断

criteria:
  persist: 5
  cooldown: 3
  cov:
    form: 1.15
    break: 1.25
    max_neighbors: null
  ads:
    form: 1.25
    break: 1.40
    max_neighbors: null
  slab:
    form: 1.35
    break: 1.55
    max_neighbors: 12

# slab 定义：二选一（elements 或 indices）
slab:
  mode: "elements"          # "elements" | "indices"
  elements: ["Pt"]          # mode=elements 时生效
  indices: []               # mode=indices 时生效（示例留空）

# 这里是 AnalyzerConfig 字段（与 dataclass 对应）
analyzer:
  wl_iters: 3
  baseline_persist: 5
  record_init_events: false
  drop_init_events: true

  ads_signature_mode: "coarse"      # "none" | "coarse" | "detailed"
  smiles_recompute_mode: "on_change" # "always" | "on_change"

  smiles_mode: "rdkit_topology"     # "rdkit_3d"|"openbabel_3d"|"rdkit_topology"|"combo"|"edges_rdkit"|"best_effort"
  smiles_combo_order: ["rdkit_topology", "rdkit_3d", "openbabel_3d"]
  smiles_combo_treat_suspicious_as_failure: true
  smiles_combo_prefer_charged: false

  smiles_allow_charged: false
  smiles_allow_dot: false

  rdkit_sanitize: true
  rdkit_hide_hs: false
  smiles_fallback_to_formula_if_suspicious: false

  split_by_component: true
  component_overlap_min: 0.0
  component_overlap_mode: "symmetric"   # "symmetric"|"old_to_new"|"new_to_old"
  require_component_mapping: true
  split_component_keep_bond_evidence: true

  record_frame_species: true
  frame_species_include_counts: true
  frame_species_include_components: true
  frame_species_streaming: true
  frame_species_path: null

  reaction_summary_include_frames: true

  # --- site增强相关---
  site_signature_mode: "type"   # "none"|"type"|"id"|"type+id"|"detailed"

site:
  enabled: false
  file: "sites.yaml"

  # 索引解释方式：
  # 0 = 按 ASE 习惯（0-based）
  # 1 = 输入是 1-based，加载时自动减1
  index_base: 0

  # 严格校验：
  # true: 越界/非slab索引直接报错
  # false: 忽略非法索引
  strict_index_validation: true