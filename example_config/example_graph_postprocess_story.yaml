# Graph postprocess example: story mode
#
# Extract the shortest-path subgraph connecting source and target nodes.

mode: story

input:
  # Input GraphML produced by the analyzer.
  graph: "Ga_network.graphml"

output:
  # Output GraphML for the extracted path subgraph.
  graph: "Ga_network_story.graphml"

story:
  # Sources and targets can be given as node id, orig_id, label, or display_label.
  sources:
    - "C2H4|smiles=[H][CH]([H])[CH]([H])[H]"
  targets:
    - "C6H8O|smiles=[H][CH]1[CH]([H])[CH]([C]([H])([H])[H])[O][CH]1[C]([H])([H])[H]|ads(n=1,coord=[1],slab=['Ga'])"

  # Current supported modes:
  # - shortest
  # - chemical_shortest
  #
  # `chemical_shortest` penalizes hub-like intermediate species so that common
  # shuttles such as H are less likely to dominate the extracted path.
  path_mode: "chemical_shortest"

  # Graph traversal mode:
  # - directed
  # - undirected
  direction: "directed"

  # Keep at most this many shortest paths in the extracted story subgraph.
  max_paths: 10

  # When using chemical_shortest, larger values penalize highly connected
  # intermediate species more strongly.
  hub_penalty_strength: 2.0

  # Optional explicit exclusions for common intermediate species.
  # Sources and targets are never removed even if they match these filters.
  excluded_species_formulas: ["H", "H2"]
  excluded_species_labels: []

  # Remove edges with weight < min_edge_weight before path extraction.
  min_edge_weight: 1

  # Optional: merge true forward/reverse reaction pairs first.
  collapse_reversible: false

  # Remove isolated nodes after extraction.
  prune_isolates: true
