# example_analyzer.yaml
# ============================================================
# rxn_analyzer 完整示例配置
#
# 目标：
# 1. 尽量覆盖当前项目已经支持的主要功能
# 2. 用详细注释说明每个参数的作用、可设置的值、常见建议
# 3. 让用户照着这份配置修改，就能直接开始分析
#
# 使用方式：
#   python run_analyze.py
# 或：
#   python -m rxn_analyzer.runner --config example_config/example_analyzer.yaml
#
# 建议第一次使用时，优先修改这几项：
# 1. run.traj
# 2. run.out_prefix
# 3. slab_definition
# 4. geometric_site / active_site 是否启用，以及对应文件路径
# ============================================================


run:
  # 轨迹文件路径。
  # 支持相对路径和绝对路径。
  # 相对路径默认相对于当前配置文件所在目录解析。
  traj: "../example_traj/md.extxyz"

  # 输出前缀。
  # 程序输出的 csv / tsv / graphml 等文件会以这个前缀开头。
  out_prefix: "example_full"

  # 抽帧步长。
  # 可设置值：
  # - 1: 每一帧都分析
  # - 2: 每隔 1 帧分析 1 帧
  # - 10: 每 10 帧分析 1 帧
  # 数值越大越快，但时间分辨率越低。
  stride: 1

  # 最大分析帧数。
  # 可设置值：
  # - null: 分析完整条轨迹
  # - 正整数: 只分析前 N 帧
  max_frames: null

  # tqdm 进度条是否显示总帧数。
  # true:
  #   会先统计轨迹总帧数，进度条更完整，但开始时可能稍慢。
  # false:
  #   不预统计总帧数，适合大轨迹或快速启动。
  progress_with_total: true


criteria:
  # ----------------------------------------------------------
  # 时间稳定性参数
  # ----------------------------------------------------------
  # persist:
  # 新的边状态需要连续出现多少帧，才会被正式确认。
  # 值越大，越能抑制热振动带来的误判，但反应检测会更滞后。
  persist: 5

  # cooldown:
  # 每次状态切换后，需要等待多少帧，才能再次切换。
  # 用于减少边界抖动。
  cooldown: 3

  # ----------------------------------------------------------
  # 距离滞回阈值
  # ----------------------------------------------------------
  # 对任意原子对 i-j：
  #   d_form  = form  * (ri + rj)
  #   d_break = break * (ri + rj)
  #
  # 规则：
  # - 当前未成键时：distance <= d_form 才会形成键
  # - 当前已成键时：distance <= d_break 才会保持键
  #
  # 所以一般要求：
  #   break >= form
  #
  # max_neighbors:
  # 每个原子在该类边上允许保留的最大瞬时邻居数。
  # - null: 不限制
  # - 正整数: 只保留最近的若干个邻居
  # 对 slab 金属原子通常建议限制一下，避免虚假高配位。

  cov:
    # 共价键判定参数，用于非 slab 原子之间的连边。
    form: 1.15
    break: 1.25
    max_neighbors: null

  ads:
    # 吸附键判定参数，用于 slab 原子和非 slab 原子之间的连边。
    form: 1.25
    break: 1.40
    max_neighbors: null

  slab:
    # slab 内部原子之间的连边参数。
    # 这些边会用于：
    # - 判定表面局部拓扑
    # - 自动识别 bridge / hollow / fourfold 等位点
    form: 1.35
    break: 1.55
    max_neighbors: 12


host_definition:
  # ==========================================================
  # slab 定义：哪些原子被视为表面 / 基底原子
  # ==========================================================
  #
  # mode 可设置值：
  # - "elements": 按元素符号识别 slab 原子
  # - "indices" : 按原子索引识别 slab 原子
  #
  # 使用建议：
  # - 如果 slab 由一种或几种固定元素组成，优先用 elements
  # - 如果体系里同一种元素同时出现在 slab 和吸附物里，改用 indices
  mode: "elements"

  # mode="elements" 时生效。
  # 这些元素的所有原子都会被视为 slab。
  elements: ["Pt"]

  # mode="indices" 时生效。
  # 支持：
  # - 空列表：[]，表示“没有 host”，适合纯分子或无基底体系
  # - 单个索引：22
  # - 区间简写："1-20"
  # - 混合写法：["1-20", 22, "26-100"]
  indices: []

  # mode="indices" 时生效。
  # 索引解释方式：
  # - 0: 按 0-based 输入
  # - 1: 按 1-based 输入，加载时自动减 1
  index_base: 0

  # 是否对最终选中的 host 原子集合做反选。
  # 例如：
  # mode: "indices"
  # indices: ["1-20", 22, "26-100"]
  # index_base: 1
  # invert: true
  # 表示“除了这些索引以外，其余原子都算 host”
  #
  # 注意：
  # - 如果 indices: [] 且 invert: false，则表示“没有 host”
  # - 如果 indices: [] 且 invert: true，则表示“所有原子都是 host”
  invert: false


analyzer:
  # ==========================================================
  # 物种标签与反应分析主参数
  # ==========================================================

  # WL 图哈希迭代次数。
  # 用于在没有稳定 SMILES 时生成 formula|wl=... 标签。
  # 值越大，拓扑区分能力越强，但代价略高。
  wl_iters: 3

  # 基线稳定判断所需连续帧数。
  # 在轨迹开始阶段，程序会先等待体系“稳定下来”，再进入常规反应统计。
  baseline_persist: 5

  # 是否记录初始分配阶段的事件。
  # 只有当 drop_init_events=false 时才有意义。
  record_init_events: false

  # 是否丢弃初始阶段事件。
  # true:
  #   warmup 阶段的 init_assignment 事件不进入最终输出。
  # false:
  #   保留这些初始事件。
  drop_init_events: true

  # ----------------------------------------------------------
  # 吸附签名
  # ----------------------------------------------------------
  # ads_signature_mode 和下面的 site_signature_mode 不是二选一关系。
  # 当前实现会先追加 ads 信息，再追加 site 信息。
  #
  # 例如：
  # - ads_signature_mode: "coarse"
  # - site_signature_mode: "type"
  #
  # 最终标签可能形如：
  #   ...|ads|site_type=top
  #
  # 所以即使 ads_signature_mode="coarse"，
  # site_signature_mode="type" 也仍然有用。
  #
  # 只有当 site.enabled=false，或者 site.file 没有正确加载时，
  # site_signature_mode 才不会真正生效。
  #
  # 可设置值：
  # - "none"    : 不在物种标签中追加吸附信息
  # - "coarse"  : 仅追加 |ads
  # - "topology": 追加原子级吸附边列表，例如 pairs=[C5-Pt120,C5-Pt121]
  # - "detailed": 追加更详细的吸附统计，但保持标签可聚类
  #
  # 三种信息量从低到高大致可以理解为：
  # - coarse   : 只回答“它是不是吸附态”
  # - detailed : 回答“它有几条吸附键、连接分布如何、接触了哪些 slab 元素”
  # - topology : 回答“到底是吸附物里的哪个原子连到了 slab 上的哪个原子”
  #
  # 其中 detailed 当前会输出：
  # - n       : 吸附键总数
  # - coord   : 组分内各吸附原子连接 slab 的次数分布
  # - slab    : 接触到的 slab 原子元素列表（保留重复）
  #
  # 如果你还想看完整的原子级吸附边，请打开：
  # - analyzer.record_frame_species: true
  # 然后到 <out_prefix>_frame_species.csv 的 ads_pairs 列中查看
  #
  # topology 当前会输出：
  # - n       : 吸附键总数
  # - pairs   : 带元素符号的原子级吸附边列表，格式如 C5-Pt120
  #
  # 建议：
  # - 做反应网络 / 聚类时优先用 detailed
  # - topology 更适合诊断，不建议默认用于构建主标签
  ads_signature_mode: "detailed"

  # ----------------------------------------------------------
  # 位点签名
  # ----------------------------------------------------------
  # 只有 site.enabled=true 且成功加载 site 文件时才会生效。
  #
  # 可设置值：
  # - "none"     : 不追加位点信息
  # - "type"     : 追加 site_type，例如 top / bridge / fcc
  # - "id"       : 追加具体 site_id
  # - "type+id"  : 同时追加 site_id 与 site_type
  # - "detailed" : 当前实现与 type+id 等价
  #
  # 建议：
  # - 如果只想区分“是否吸附”，看 ads_signature_mode
  # - 如果还想区分“吸附在什么位点上”，再打开 site_signature_mode
  # - 统计聚类时用 "type"
  # - 想区分具体位点时用 "type+id"
  geometric_site_signature_mode: "type"

  # ----------------------------------------------------------
  # SMILES 生成策略
  # ----------------------------------------------------------

  # 何时重新计算 SMILES。
  # 可设置值：
  # - "always"   : 每帧都重新算
  # - "on_change": 只有组分拓扑变化时才重新算，通常更快
  smiles_recompute_mode: "always"

  # 主 SMILES 策略。
  # 可设置值：
  # - "rdkit_3d"
  # - "openbabel_3d"
  # - "rdkit_topology"
  # - "combo"
  # - "edges_rdkit"  : rdkit_topology 的别名
  # - "best_effort"  : combo 的别名
  #
  # 常见建议：
  # - 如果边判定比较可信，优先用 rdkit_topology
  smiles_mode: "rdkit_topology"

  # combo 模式下按什么顺序尝试各个策略。
  # 可选项：
  # - rdkit_topology
  # - rdkit_3d
  # - openbabel_3d
  # - edges_rdkit
  # - best_effort
  smiles_combo_order: ["rdkit_topology", "rdkit_3d", "openbabel_3d"]

  # combo 模式中，遇到“可疑 SMILES”时是否视为失败并继续尝试后续策略。
  # 所谓“可疑”主要由下面两个开关控制：
  # - smiles_allow_charged
  # - smiles_allow_dot
  smiles_combo_treat_suspicious_as_failure: true

  # combo 模式中，是否优先选择带电 SMILES。
  smiles_combo_prefer_charged: false

  # 是否允许带电 SMILES（含 + / -）。
  smiles_allow_charged: true

  # 是否允许多分子 SMILES（含 .）。
  smiles_allow_dot: false

  # RDKit topology 模式是否做 sanitize。
  rdkit_sanitize: true

  # RDKit 输出时是否隐藏氢。
  rdkit_hide_hs: false

  # 如果得到的 SMILES 被判断为“可疑”，是否回退成 formula|wl 标签。
  # true:
  #   用更保守的标签
  # false:
  #   仍保留该 SMILES
  smiles_fallback_to_formula_if_suspicious: true

  # ----------------------------------------------------------
  # 反应拆分 / 组分映射
  # ----------------------------------------------------------

  # 是否将全局变化尽量拆分成多个局部反应事件。
  split_by_component: true

  # 前后组分映射时的最小重叠阈值。
  # 范围通常在 [0, 1]。
  # - 0.0: 只要有重叠就允许匹配
  # - 0.5: 至少一半重叠
  component_overlap_min: 0.0

  # 组分重叠评分模式。
  # 可设置值：
  # - "symmetric"
  # - "old_to_new"
  # - "new_to_old"
  component_overlap_mode: "symmetric"

  # 是否要求组分映射成功后才拆分。
  # true:
  #   如果局部映射不可靠，回退到全局 delta 发射
  # false:
  #   更激进地拆分事件
  require_component_mapping: true

  # 拆分事件后是否保留并分配 bond evidence。
  split_component_keep_bond_evidence: true

  # ----------------------------------------------------------
  # 每帧物种记录
  # ----------------------------------------------------------

  # 是否输出每帧物种表。
  record_frame_species: true

  # 每帧物种表中是否附带 species 计数字段。
  frame_species_include_counts: true

  # 每帧物种表中是否附带连通分量原子索引。
  frame_species_include_components: true

  # 每帧物种表会额外包含 ads_pairs 列。
  # 该列记录每个连通分量的原子级吸附边列表，例如：
  # [["C5-Pt120","C5-Pt121"], [], ["O8-Pt140"]]
  # 这样就能在不污染主物种标签的前提下保留完整吸附拓扑。
  #
  # 每帧物种表还会额外包含 site_assignments 列。
  # 该列记录每个连通分量最终的位点分配结果，例如：
  # [
  #   {"primary_site_id":"auto_bridge_120_121","primary_site_type":"bridge",...},
  #   null,
  #   {"primary_site_id":"top_001","primary_site_type":"top",...}
  # ]
  # 它和 species / components / ads_pairs 按连通分量顺序一一对应。

  # true:
  #   边分析边写出 CSV，内存占用更低
  # false:
  #   最后统一写出
  frame_species_streaming: true

  # 每帧物种表路径。
  # null 时自动使用 <out_prefix>_frame_species.csv
  frame_species_path: null

  # 汇总反应表中是否包含正反向发生帧列表。
  reaction_summary_include_frames: true

  # ----------------------------------------------------------
  # active_site 输出控制
  # ----------------------------------------------------------

  # 是否记录每帧 reactive site 状态。
  active_site_record_states: true

  # 是否记录 reactive site 事件。
  active_site_record_events: true

  # 是否记录 reactive site 与物种反应耦合得到的联合反应。
  active_site_record_joint_reactions: true

  # 是否对 active_site 相关 CSV 使用流式写出。
  # true:
  #   分析过程中边写出 site_states / site_events / joint_site_reactions
  #   更适合长轨迹，进度条结束后等待时间也更短
  # false:
  #   整条轨迹跑完后再一次性写出
  active_site_streaming: true


geometric_site:
  # ==========================================================
  # 表面位点定义（给物种标签追加 top / bridge / fcc 等信息）
  # ==========================================================
  #
  # 功能：
  # - 可以手工定义位点
  # - 也可以在 site 文件里启用 auto_site，自动按局部几何判位点
  #
  # 启用后，site_signature_mode 才有意义。
  enabled: true

  # 位点定义文件路径。
  # 本项目示例文件中已经包含：
  # - 手工定义位点示例
  # - auto_site 自动位点识别示例
  file: "example_site.yaml"

  # site 文件中的原子索引基准。
  # 可设置值：
  # - 0: 0-based
  # - 1: 1-based
  index_base: 0

  # 是否严格校验 site 文件中的索引。
  # true:
  #   越界或非 slab 原子会直接报错
  # false:
  #   非法索引会被跳过
  strict_index_validation: true


active_site:
  # ==========================================================
  # 反应位点状态跟踪
  # ==========================================================
  #
  # 这是比普通 site 更“化学过程导向”的分析。
  # 适合跟踪某个活性中心附近的：
  # - intrinsic species
  # - incorporated species
  # - associated species
  # - 状态变化事件
  enabled: true

  # reactive site 定义文件路径。
  file: "example_reactive_site.yaml"

  # reactive site 文件中的原子索引基准。
  # 可设置值：
  # - 0: 0-based
  # - 1: 1-based
  index_base: 0

  # 是否严格校验 core_members 必须属于当前 slab。
  strict_core_validation: true


# ============================================================
# 输出文件说明（启用相应功能后）
# ============================================================
#
# 常规输出：
# - <out_prefix>_events_transform.csv
#   物种变化事件
#
# - <out_prefix>_events_bonds.csv
#   成键 / 断键事件
#
# - <out_prefix>_network.graphml
#   反应网络图
#
# - <out_prefix>_network_mixture.graphml
#   mixture 兼容图
#
# - <out_prefix>_reactions_summary.tsv
#   反应汇总表
#
# - <out_prefix>_frame_species.csv
#   每帧物种表（record_frame_species=true 时）
#
# active_site 相关输出：
# - <out_prefix>_site_states.csv
# - <out_prefix>_site_events.csv
# - <out_prefix>_site_joint_reactions.csv
# - 以及可能的 graph / tsv 派生输出
#
# ============================================================
# 常见修改模板
# ============================================================
#
# 1. 如果只想做“普通物种反应分析”，不做位点分析：
#    site.enabled: false
#    active_site.enabled: false
#    analyzer.geometric_site_signature_mode: "none"
#
# 2. 如果只想做“自动位点识别 + 物种标签增强”：
#    site.enabled: true
#    site.file: "example_site.yaml"
#    active_site.enabled: false
#    analyzer.geometric_site_signature_mode: "type" 或 "type+id"
#
# 3. 如果体系里 slab 元素和吸附物元素重合：
#    把 slab_definition.mode 改成 "indices"
#    然后填写 slab_definition.indices
#
# 4. 如果轨迹很大，想先快速试跑：
#    run.max_frames: 1000
#    run.stride: 5
#    analyzer.smiles_recompute_mode: "on_change"
#    analyzer.frame_species_streaming: true
#
# ============================================================
